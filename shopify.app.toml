# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "32304122c5ca8e4fef4e1ac9345de890"
name = "Pufero Loyalty"
application_url = "https://pufero-loyalty-production-9b87.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/cancelled"
  topics = [ "orders/cancelled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/edited"
  topics = [ "orders/edited" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/refunds/create"
  topics = [ "refunds/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/draft_orders/create"
  topics = [ "draft_orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/draft_orders/delete"
  topics = [ "draft_orders/delete" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/create"
  topics = [ "customers/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/update"
  topics = [ "customers/update" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_products,read_orders,read_draft_orders,read_customers,write_customers,write_discounts"

[app_proxy]
url = "https://pufero-loyalty-production-9b87.up.railway.app/apps/loyalty"
subpath = "loyalty"
prefix = "apps"

[auth]
redirect_urls = [
  "https://pufero-loyalty-production-9b87.up.railway.app/auth/callback",
  "https://pufero-loyalty-production-9b87.up.railway.app/auth/shopify/callback",
  "https://pufero-loyalty-production-9b87.up.railway.app/api/auth/callback"
]
